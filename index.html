<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>归序7日营 · 打卡</title>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FDF9F3;
  --card-bg: #FFFDF8;
  --gold: #C9A84C;
  --gold-light: #F5E9C8;
  --text-dark: #3D2E1E;
  --text-muted: #8B7355;
  --green: #7BAE7F;
  --green-light: #E8F4E9;
  --border: #EDE4D8;
  --radius: 16px;
  --radius-sm: 10px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text-dark); min-height: 100vh; line-height: 1.6; }
.container { max-width: 480px; margin: 0 auto; padding: 0 20px 80px; }
.header { padding: 32px 0 20px; text-align: center; }
.header-logo { font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; margin-bottom: 4px; }
.camp-name { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; }

/* 登录页 */
.login-card { background: var(--card-bg); border-radius: var(--radius); padding: 40px 28px; box-shadow: 0 2px 12px rgba(61,46,30,0.08); border: 1px solid var(--border); margin-top: 60px; }
.login-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; text-align: center; }
.login-card p { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 28px; }
.login-input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; color: var(--text-dark); background: var(--bg); outline: none; margin-bottom: 16px; text-align: center; letter-spacing: 2px; }
.login-input:focus { border-color: var(--gold); }
.login-btn { width: 100%; padding: 14px; background: var(--gold); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 500; cursor: pointer; }
.login-btn:hover { background: #b8952f; }
.admin-link { display: block; text-align: center; margin-top: 20px; color: #C9A84C; font-size: 12px; cursor: pointer; text-decoration: underline; background: none; border: none; }

/* 营长页 */
.admin-card { background: var(--card-bg); border-radius: var(--radius); padding: 40px 28px; box-shadow: 0 2px 12px rgba(61,46,30,0.08); border: 1px solid var(--border); margin-top: 60px; }
.admin-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; text-align: center; }
.admin-card p { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 28px; }
.back-link { display: block; text-align: center; margin-top: 16px; color: #c4b49a; font-size: 12px; cursor: pointer; text-decoration: underline; }

/* 管理后台 */
.admin-stats { display: flex; gap: 12px; margin-bottom: 20px; }
.admin-stat-card { flex: 1; background: var(--card-bg); border-radius: var(--radius-sm); padding: 16px; text-align: center; border: 1px solid var(--border); }
.admin-stat-card .num { font-size: 24px; font-weight: 700; color: var(--gold); }
.admin-stat-card .label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.admin-btn { padding: 10px 16px; background: var(--gold); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; }
.admin-btn-danger { background: #e07860; }
.student-item { background: var(--card-bg); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 10px; border: 1px solid var(--border); }
.student-name { font-size: 15px; font-weight: 500; }
.student-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.view-detail-btn { padding: 6px 10px; font-size: 11px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); cursor: pointer; margin-left: 8px; }
.no-data { text-align: center; padding: 40px; color: var(--text-muted); }

/* 详情弹窗 */
.detail-overlay { position: fixed; inset: 0; background: rgba(61, 46, 30, 0.5); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 24px; }
.detail-card { background: var(--card-bg); border-radius: 24px; padding: 28px 24px; max-width: 480px; width: 100%; max-height: 80vh; overflow-y: auto; }
.detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.detail-name { font-size: 18px; font-weight: 600; }
.detail-close { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); cursor: pointer; font-size: 16px; }
.detail-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px; }
.detail-table th { background: var(--gold-light); padding: 8px 6px; text-align: left; font-weight: 500; }
.detail-table td { padding: 8px 6px; border-bottom: 1px solid var(--border); vertical-align: top; }
.check-yes { color: var(--green); }
.check-no { color: #d4c4b0; }
.text-content { max-width: 100px; word-break: break-all; white-space: pre-wrap; font-size: 11px; }

/* 进度卡片 */
.progress-card { background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: 0 2px 12px rgba(61,46,30,0.06); border: 1px solid var(--border); margin-bottom: 20px; }
.progress-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
.day-badge { font-size: 13px; color: var(--gold); font-weight: 600; background: var(--gold-light); padding: 4px 12px; border-radius: 20px; }
.streak-info { font-size: 12px; color: var(--text-muted); }
.streak-info strong { color: var(--gold); }
.progress-title { font-size: 18px; font-weight: 600; margin-bottom: 14px; }
.progress-bar-wrap { background: var(--border); border-radius: 8px; height: 6px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #e8c96a); border-radius: 8px; transition: width 0.6s; }
.progress-stats { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; color: var(--text-muted); }
.progress-stats strong { color: var(--text-dark); }

/* 勋章 */
.medals { display: flex; align-items: center; gap: 6px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.medals-label { font-size: 12px; color: var(--text-muted); margin-right: 4px; }
.medal { width: 28px; height: 28px; border-radius: 50%; background: var(--gold); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.medal-empty { background: #E8DCC8; color: transparent; }

/* 任务列表 */
.section-label { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 12px; }
.task-card { background: var(--card-bg); border-radius: var(--radius); padding: 18px 20px; box-shadow: 0 2px 12px rgba(61,46,30,0.06); border: 1px solid var(--border); margin-bottom: 12px; }
.task-card.checked { border-color: var(--green); background: var(--green-light); }
.task-top { display: flex; align-items: center; gap: 12px; }
.task-check-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.task-card.checked .task-check-btn { background: var(--green); border-color: var(--green); color: #fff; }
.task-info { flex: 1; }
.task-name { font-size: 15px; font-weight: 500; }
.task-desc { font-size: 12px; color: var(--text-muted); }
.task-star { font-size: 12px; color: var(--gold); font-weight: 600; }
.task-textarea { width: 100%; margin-top: 12px; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; color: var(--text-dark); background: var(--bg); resize: none; line-height: 1.6; min-height: 70px; }
.task-textarea[readonly] { background: var(--border); color: var(--text-muted); }
.task-optional-tag { font-size: 10px; color: var(--text-muted); background: var(--border); padding: 1px 6px; border-radius: 8px; margin-left: 4px; }

/* 已提交横幅 */
.submitted-banner { background: var(--green-light); border: 1px solid var(--green); border-radius: var(--radius-sm); padding: 8px 16px; text-align: center; margin-bottom: 12px; font-size: 13px; color: var(--green); font-weight: 500; }

/* 提交按钮 */
.submit-section { margin: 20px 0; }
.submit-btn { width: 100%; padding: 16px; background: var(--gold); color: #fff; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 16px rgba(201,168,76,0.3); }
.submit-btn:hover { background: #b8952f; }

/* 日期导航 */
.date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.date-nav-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12px; color: var(--text-muted); cursor: pointer; }
.date-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.current-date-label { font-size: 13px; color: var(--text-muted); }

/* Toast */
.toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--text-dark); color: #fff; padding: 10px 24px; border-radius: 40px; font-size: 14px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 9999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 庆祝弹窗 */
.celebration-overlay { position: fixed; inset: 0; background: rgba(61, 46, 30, 0.5); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 24px; }
.celebration-card { background: var(--card-bg); border-radius: 24px; padding: 36px 28px; max-width: 340px; width: 100%; text-align: center; box-shadow: 0 16px 48px rgba(61, 46, 30, 0.2); border: 1.5px solid var(--gold-light); }
.celebration-icon { font-size: 52px; margin-bottom: 16px; }
.celebration-day { font-size: 13px; color: var(--gold); font-weight: 600; letter-spacing: 2px; margin-bottom: 10px; }
.celebration-quote { font-size: 18px; font-weight: 600; line-height: 1.7; margin-bottom: 24px; }
.celebration-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }
.celebration-medal { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #C9A84C, #F5D97A); color: #fff; font-size: 28px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 4px 16px rgba(201, 168, 76, 0.5); }
.celebration-close { width: 100%; padding: 12px; background: var(--gold); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; cursor: pointer; }

/* 响应式 */
@media (max-width: 480px) { .container { padding: 0 16px 80px; } .progress-card { padding: 20px; } }
  </style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
'use strict';

var STORAGE_KEY = 'guixu_checkin_data_v2';
var ADMIN_PASSWORD = '4266';

// JSONBin 云同步配置
var JSONBIN_API = 'https://api.jsonbin.io/v3/b';
var JSONBIN_KEY = '$2a$10$9MgSVwtSiU7dg6/lOLJQI.CquFtaT3gKxBvss9KKjBo.v8vHneiG6';
var MASTER_BIN_KEY = 'guixu_master_bin_id'; // localStorage key for master bin ID
var SYNC_ENABLED = true;
// 所有用户共用的 master bin ID（确保数据共享）
var SHARED_MASTER_BIN_ID = '69cfc76baaba882197bfe06a';

var DEFAULT_TASKS = [
  { id: 'morning_water', name: '早起温水', desc: '温饮归元 唤醒身体', type: 'single', star: 1, required: true },
  { id: 'life_anchor',   name: '生活锚点',   desc: '每天设一个小动作', type: 'text', star: 1, required: true },
  { id: 'evening_review', name: '晚间复盘',   desc: '睡前5分钟复盘', type: 'text', star: 1, required: true },
  { id: 'breakfast',      name: '早餐',        desc: '慢品晨光',     type: 'single', star: 1, required: false },
  { id: 'lunch',          name: '中餐',        desc: '细嚼慢咽',     type: 'single', star: 1, required: false },
  { id: 'dinner',         name: '晚餐',        desc: '好好吃饭',     type: 'single', star: 1, required: false }
];

var DAY_QUOTES = [
  '你的出发，比完美更重要。',
  '做到的每一件小事，都是内在秩序的一块砖。',
  '一个锚点，胜过一千个计划。',
  '让复盘成为每日的礼物。',
  '进步不是线性的，是每一个"微小动作"的叠加。',
  '每一刻的觉知，都是光。',
  null
];
var DAY7_QUOTE = '所谓奇迹，不过是平凡人坚持了不平凡的7天。\n恭喜你，完成了这场自我进化的穿越之旅。';

var currentStudent = null;
var currentViewDate = todayStr();
var isAdminMode = false;

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function formatDate(dateStr) {
  var d = new Date(dateStr + 'T12:00:00');
  var weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  return (d.getMonth() + 1) + '月' + d.getDate() + '日 ' + weekdays[d.getDay()];
}

function getDayNumber(firstCheckIn, now) {
  var start = new Date(firstCheckIn + 'T12:00:00');
  var end = new Date(now + 'T12:00:00');
  return Math.floor((end - start) / 86400000) + 1;
}

function getConsecutiveDays(checkInDays) {
  if (!checkInDays || checkInDays.length === 0) return 0;
  var sorted = checkInDays.slice().sort();
  var consecutive = 1;
  for (var i = sorted.length - 1; i > 0; i--) {
    var diff = (new Date(sorted[i] + 'T12:00:00') - new Date(sorted[i - 1] + 'T12:00:00')) / 86400000;
    if (diff === 1) consecutive++;
    else break;
  }
  return consecutive;
}

function getMedalCount(student) {
  return Math.floor((student.checkInDays ? student.checkInDays.length : 0) / 7);
}

function getData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    // 云端同步（异步，不阻塞）
    if (SYNC_ENABLED && currentStudent && data.students && data.students[currentStudent]) {
      syncStudentToCloud(data.students[currentStudent]);
    }
  } catch (e) {
    console.warn('存储失败:', e);
  }
}

// ===== JSONBin 云端同步 =====

// 获取或创建 master bin（使用共用 bin ID 确保所有用户共享同一份数据）
function getOrCreateMasterBin() {
  return new Promise(function(resolve, reject) {
    var masterBinId = localStorage.getItem(MASTER_BIN_KEY);
    // 优先使用已有的 bin ID，否则使用共用 bin ID
    if (!masterBinId) {
      masterBinId = SHARED_MASTER_BIN_ID;
      localStorage.setItem(MASTER_BIN_KEY, masterBinId);
    }
    resolve(masterBinId);
  });
}

// 读取 master bin 内容
function fetchMasterBin() {
  return new Promise(function(resolve, reject) {
    var masterBinId = localStorage.getItem(MASTER_BIN_KEY);
    if (!masterBinId) {
      resolve({ students: {} });
      return;
    }
    var xhr = new XMLHttpRequest();
    xhr.open('GET', JSONBIN_API + '/' + masterBinId, true);
    xhr.setRequestHeader('X-Master-Key', JSONBIN_KEY);
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var resp = JSON.parse(xhr.responseText);
          resolve(resp.record || { students: {} });
        } catch (e) {
          resolve({ students: {} });
        }
      } else {
        resolve({ students: {} });
      }
    };
    xhr.onerror = function() { resolve({ students: {} }); };
    xhr.send();
  });
}

// 更新 master bin（增量更新单个学员）
function updateMasterBinStudent(name, studentData) {
  return new Promise(function(resolve, reject) {
    var masterBinId = localStorage.getItem(MASTER_BIN_KEY);
    if (!masterBinId) {
      resolve();
      return;
    }
    // 先读取当前 master bin，再更新
    var xhr = new XMLHttpRequest();
    xhr.open('GET', JSONBIN_API + '/' + masterBinId, true);
    xhr.setRequestHeader('X-Master-Key', JSONBIN_KEY);
    xhr.onload = function() {
      var masterData = { students: {} };
      if (xhr.status === 200) {
        try {
          var resp = JSON.parse(xhr.responseText);
          masterData = resp.record || { students: {} };
        } catch (e) {}
      }
      // 增量更新该学员数据
      masterData.students[name] = studentData;
      // 写回
      var xhr2 = new XMLHttpRequest();
      xhr2.open('PUT', JSONBIN_API + '/' + masterBinId, true);
      xhr2.setRequestHeader('Content-Type', 'application/json');
      xhr2.setRequestHeader('X-Master-Key', JSONBIN_KEY);
      xhr2.onload = function() {
        if (xhr2.status === 200) resolve();
        else reject(new Error('更新 master bin 失败: ' + xhr2.status));
      };
      xhr2.onerror = function() { reject(new Error('网络错误')); };
      xhr2.send(JSON.stringify(masterData));
    };
    xhr.onerror = function() { reject(new Error('网络错误')); };
    xhr.send();
  });
}

// 云端同步学员数据（每次打卡保存时调用）
function syncStudentToCloud(student) {
  if (!SYNC_ENABLED) return;
  getOrCreateMasterBin().then(function() {
    updateMasterBinStudent(currentStudent, student);
  }).catch(function(e) {
    console.warn('云同步失败:', e);
  });
}

// 从云端 master bin 删除指定学员
function deleteStudentFromCloud(name) {
  var masterBinId = localStorage.getItem(MASTER_BIN_KEY);
  if (!masterBinId) return;
  var xhr = new XMLHttpRequest();
  xhr.open('GET', JSONBIN_API + '/' + masterBinId, true);
  xhr.setRequestHeader('X-Master-Key', JSONBIN_KEY);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var masterData = JSON.parse(xhr.responseText).record || { students: {} };
        delete masterData.students[name];
        var xhr2 = new XMLHttpRequest();
        xhr2.open('PUT', JSONBIN_API + '/' + masterBinId, true);
        xhr2.setRequestHeader('Content-Type', 'application/json');
        xhr2.setRequestHeader('X-Master-Key', JSONBIN_KEY);
        xhr2.send(JSON.stringify(masterData));
      } catch (e) {}
    }
  };
  xhr.send();
}

// 营长后台从云端获取所有数据
function fetchCloudData() {
  return new Promise(function(resolve, reject) {
    if (!SYNC_ENABLED) {
      resolve(getData());
      return;
    }
    fetchMasterBin().then(function(masterData) {
      // 合并本地和云端数据
      var localData = getData();
      var cloudStudents = masterData.students || {};
      var localStudents = localData.students || {};

      // 以云端为准，补充本地独有的学员
      var mergedStudents = {};
      var allNames = {};
      var n;
      for (n in cloudStudents) allNames[n] = true;
      for (n in localStudents) allNames[n] = true;

      for (var name in allNames) {
        var cloudStu = cloudStudents[name] || {};
        var localStu = localStudents[name] || {};
        // 深度合并tasks
        var mergedTasks = {};
        var allDates = {};
        var td;
        for (td in (cloudStu.tasks || {})) allDates[td] = true;
        for (td in (localStu.tasks || {})) allDates[td] = true;
        for (td in allDates) {
          mergedTasks[td] = Object.assign({}, (cloudStu.tasks || {}[td]) || {}, (localStu.tasks || {}[td]) || {});
        }
        mergedStudents[name] = {
          firstCheckIn: cloudStu.firstCheckIn || localStu.firstCheckIn || '',
          checkInDays: (cloudStu.checkInDays && cloudStu.checkInDays.length > (localStu.checkInDays || []).length) ? cloudStu.checkInDays : (localStu.checkInDays || []),
          submittedDates: (cloudStu.submittedDates && cloudStu.submittedDates.length > (localStu.submittedDates || []).length) ? cloudStu.submittedDates : (localStu.submittedDates || []),
          totalStars: cloudStu.totalStars || localStu.totalStars || 0,
          tasks: mergedTasks
        };
      }
      resolve({ students: mergedStudents });
    }).catch(function(e) {
      console.warn('云端拉取失败，使用本地数据:', e);
      resolve(getData());
    });
  });
}

// 初始化云端连接（页面加载时调用）
function initCloudSync() {
  if (!SYNC_ENABLED) return;
  getOrCreateMasterBin().catch(function(e) {
    console.warn('云端初始化失败:', e);
  });
}

function getStudent(name) {
  var data = getData();
  return data.students ? data.students[name] : null;
}

function initStudent(name) {
  var data = getData();
  if (!data.students) data.students = {};
  var today = todayStr();
  if (!data.students[name]) {
    data.students[name] = { firstCheckIn: today, checkInDays: [], tasks: {}, totalStars: 0, submittedDates: [] };
  } else {
    if (!data.students[name].submittedDates) data.students[name].submittedDates = [];
  }
  saveData(data);
  return data.students[name];
}

function ensureTasksForDay(name, dateStr) {
  var data = getData();
  var student = data.students[name];
  if (!student.tasks[dateStr]) {
    student.tasks[dateStr] = {};
    for (var i = 0; i < DEFAULT_TASKS.length; i++) {
      var t = DEFAULT_TASKS[i];
      student.tasks[dateStr][t.id] = t.type === 'text' ? '' : false;
    }
  }
  saveData(data);
  return student.tasks[dateStr];
}

function isRequiredDone(student, dateStr) {
  var dayTasks = student.tasks[dateStr];
  if (!dayTasks) return false;
  for (var i = 0; i < DEFAULT_TASKS.length; i++) {
    var task = DEFAULT_TASKS[i];
    if (!task.required) continue;
    if (task.type === 'text') {
      if (!dayTasks[task.id] || dayTasks[task.id].trim().length === 0) return false;
    } else {
      if (!dayTasks[task.id]) return false;
    }
  }
  return true;
}

function calcTodayStars(student, dateStr) {
  var dayTasks = student.tasks[dateStr];
  if (!dayTasks) return { done: 0, total: 6 };
  var done = 0;
  for (var i = 0; i < DEFAULT_TASKS.length; i++) {
    var t = DEFAULT_TASKS[i];
    if (t.type === 'text') {
      if (dayTasks[t.id] && dayTasks[t.id].trim().length > 0) done += t.star;
    } else {
      if (dayTasks[t.id]) done += t.star;
    }
  }
  return { done: done, total: 6 };
}

function calcTotalStars(student) {
  var total = 0;
  var tasks = student.tasks || {};
  var dateKeys = Object.keys(tasks);
  for (var i = 0; i < dateKeys.length; i++) {
    var dayTasks = tasks[dateKeys[i]];
    for (var j = 0; j < DEFAULT_TASKS.length; j++) {
      var t = DEFAULT_TASKS[j];
      if (t.type === 'text') {
        if (dayTasks[t.id] && dayTasks[t.id].trim().length > 0) total += t.star;
      } else {
        if (dayTasks[t.id]) total += t.star;
      }
    }
  }
  return total;
}

// ===== 导出 CSV =====
function exportFullCSV(studentsData) {
  var data = studentsData || getData();
  var students = data.students || {};
  var studentNames = Object.keys(students);
  
  if (studentNames.length === 0) {
    showToast('暂无数据可导出');
    return;
  }
  
  var headers = ['日期', '学员姓名', '首次打卡', '打卡天数', '提交天数', '累计星星', '早起温水', '生活锚点', '晚间复盘', '早餐', '中餐', '晚餐', '是否提交'];
  var rows = [headers.join(',')];
  
  var allDates = {};
  for (var i = 0; i < studentNames.length; i++) {
    var keys = Object.keys(students[studentNames[i]].tasks || {});
    for (var j = 0; j < keys.length; j++) {
      allDates[keys[j]] = true;
    }
  }
  var sortedDates = Object.keys(allDates).sort();
  
  var escapeCsv = function(str) {
    if (!str) return '';
    str = String(str);
    if (str.indexOf(',') !== -1 || str.indexOf('"') !== -1 || str.indexOf('\n') !== -1) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  };
  
  for (var a = 0; a < studentNames.length; a++) {
    var name = studentNames[a];
    var stu = students[name];
    for (var b = 0; b < sortedDates.length; b++) {
      var dateStr = sortedDates[b];
      var dayTasks = stu.tasks ? stu.tasks[dateStr] : {};
      var isSubmitted = stu.submittedDates && stu.submittedDates.indexOf(dateStr) !== -1;
      
      var row = [
        dateStr,
        escapeCsv(name),
        stu.firstCheckIn || '',
        stu.checkInDays ? stu.checkInDays.length : 0,
        stu.submittedDates ? stu.submittedDates.length : 0,
        calcTotalStars(stu),
        dayTasks.morning_water ? '完成' : '未完成',
        escapeCsv(dayTasks.life_anchor || ''),
        escapeCsv(dayTasks.evening_review || ''),
        dayTasks.breakfast ? '完成' : '未完成',
        dayTasks.lunch ? '完成' : '未完成',
        dayTasks.dinner ? '完成' : '未完成',
        isSubmitted ? '已提交' : '未提交'
      ];
      rows.push(row.join(','));
    }
  }
  
  var csvContent = '\ufeff' + rows.join('\n');
  var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var link = document.createElement('a');
  link.href = url;
  link.download = '归序7日营打卡记录_' + todayStr() + '.csv';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
  showToast('CSV 导出成功');
}

    })(checkBtns[bi]);
  }
  
  var textareas = document.querySelectorAll('.task-textarea:not([readonly])');
  for (var tai = 0; tai < textareas.length; tai++) {
    (function(ta) {
      ta.addEventListener('input', function() {
        saveTextTask(ta.getAttribute('data-task'), ta.value, currentViewDate);
      });
    })(textareas[tai]);
  }
  
  var submitBtn = document.getElementById('submitDayBtn');
  if (submitBtn) submitBtn.addEventListener('click', handleSubmit);
}

function toggleTask(taskId, dateStr) {
  var data = getData();
  var student = data.students[currentStudent];
  ensureTasksForDay(currentStudent, dateStr);
  var was = student.tasks[dateStr][taskId];
  student.tasks[dateStr][taskId] = !was;
  if (!was && student.checkInDays.indexOf(dateStr) === -1) student.checkInDays.push(dateStr);
  saveData(data);
  renderApp();
  if (!was) {
    for (var i = 0; i < DEFAULT_TASKS.length; i++) {
      if (DEFAULT_TASKS[i].id === taskId) {
        showToast((DEFAULT_TASKS[i].name || '任务') + '打卡完成 ✓');
        break;
      }
    }
  }
}

function handleSubmit() {
  var data = getData();
  var student = data.students[currentStudent];
  var today = todayStr();
  if (!isRequiredDone(student, today)) { showToast('请先完成所有必填任务'); return; }
  if (student.submittedDates && student.submittedDates.indexOf(today) !== -1) { showToast('今日已提交'); return; }
  if (!student.submittedDates) student.submittedDates = [];
  student.submittedDates.push(today);
  if (student.checkInDays.indexOf(today) === -1) student.checkInDays.push(today);
  saveData(data);
  var stu = getStudent(currentStudent);
  var dayNum = getDayNumber(stu.firstCheckIn, today);
  showCelebration(dayNum, dayNum === 7);
  renderApp();
}

function saveTextTask(taskId, value, dateStr) {
  var data = getData();
  var student = data.students[currentStudent];
  ensureTasksForDay(currentStudent, dateStr);
  student.tasks[dateStr][taskId] = value;
  if (value.trim().length > 0 && student.checkInDays.indexOf(dateStr) === -1) student.checkInDays.push(dateStr);
  saveData(data);
  
  var today = todayStr();
  var stuRef = getStudent(currentStudent);
  var starsData = calcTodayStars(stuRef, currentViewDate);
  var pct = starsData.total > 0 ? Math.round((starsData.done / starsData.total) * 100) : 0;
  
  var barFill = document.querySelector('.progress-bar-fill');
  var statsEl = document.querySelector('.progress-stats');
  if (barFill) barFill.style.width = pct + '%';
  if (statsEl) {
    statsEl.innerHTML = '<span>' + (currentViewDate === today ? '已完成' : '当日完成') + ' <strong>' + starsData.done + '</strong> / ' + starsData.total + ' 项</span>' +
      '<span>累计 <strong>' + calcTotalStars(stuRef) + '</strong> ★</span>';
  }
  
  var taskCard = document.querySelector('[data-task-id="' + taskId + '"]');
  if (taskCard) {
    if (value.trim().length > 0) taskCard.classList.add('checked');
    else taskCard.classList.remove('checked');
  }
}

// ===== 初始化 =====
function init() {
  try {
    initCloudSync(); // 启动云端同步
    var savedName = localStorage.getItem('guixu_current_student');
    if (savedName && getStudent(savedName)) {
      currentStudent = savedName;
      currentViewDate = todayStr();
      renderApp();
    } else {
      renderLogin();
    }
  } catch (e) {
    console.error('初始化失败:', e);
    renderLogin();
  }
}

document.addEventListener('DOMContentLoaded', init);

})();
</script>
