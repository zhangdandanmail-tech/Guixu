<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>归序7日营 · 打卡工具</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');
:root { --bg: #FDF9F3; --card-bg: #FFFDF8; --gold: #C9A84C; --gold-light: #FDF0DC; --text-dark: #3D2E1E; --text-muted: #8B7355; --green: #7BAE7F; --green-light: #EDF7EE; --border: #F0E6D8; --medal-inactive: #EDE0CC; --shadow: 0 2px 16px rgba(201,168,76,0.08); --shadow-hover: 0 6px 28px rgba(201,168,76,0.15); --radius: 20px; --radius-sm: 12px; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: linear-gradient(165deg, #FFF9F2 0%, #FDF6EC 30%, #FDF3E8 70%, #FFF5ED 100%);
  color: var(--text-dark); min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased;
  background-attachment: fixed;
}
.container { max-width: 480px; margin: 0 auto; padding: 0 20px 80px; }
.header { padding: 28px 0 16px; text-align: center; position: relative; }
.header-logo { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; margin-bottom: 4px; }
.camp-name { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; }

/* 角色切换 */
.role-tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
.role-tab { padding: 6px 20px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; font-size: 13px; color: var(--text-muted); cursor: pointer; font-family: 'Noto Sans SC', sans-serif; transition: all 0.2s; }
.role-tab.active { background: var(--gold); border-color: var(--gold); color: #fff; }

/* ================================================
   春天动漫风装饰层 - 樱花 · 花瓣 · 蝴蝶 · 暖阳
   ================================================ */
.spring-decor { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }

/* 暖阳光晕 */
.deco-sun {
  position: absolute; top: -60px; right: -40px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,224,102,0.35) 0%, rgba(255,215,102,0.15) 40%, transparent 70%);
  border-radius: 50%; animation: sunPulse 6s ease-in-out infinite;
}
@keyframes sunPulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.1); opacity: 1; }
}

/* 浮动花瓣（樱花） */
.petal {
  position: absolute; top: -20px;
  width: 10px; height: 10px;
  background: radial-gradient(circle at 30% 30%, #FFB7C5 0%, #FF8FAD 60%, #FF6B8A 100%);
  border-radius: 50% 0 50% 50%;
  opacity: 0.75; pointer-events: none;
  animation: petalFall linear infinite;
}
@keyframes petalFall {
  0%   { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
  5%   { opacity: 0.8; }
  85%  { opacity: 0.7; }
  100% { transform: translateY(110vh) translateX(60px) rotate(540deg); opacity: 0; }
}

/* 左上角花朵枝杈 */
.deco-branch-tl {
  position: absolute; top: -10px; left: -10px;
  width: 140px; height: 160px;
  opacity: 0.55;
  background:
    radial-gradient(circle at 20% 75%, #FFB7C5 6px, transparent 6px),
    radial-gradient(circle at 45% 60%, #FF8FAD 5px, transparent 5px),
    radial-gradient(circle at 65% 80%, #FFB7C5 7px, transparent 7px),
    radial-gradient(circle at 30% 40%, #FF8FAD 4px, transparent 4px),
    radial-gradient(circle at 55% 30%, #FFD1DC 5px, transparent 5px),
    radial-gradient(circle at 80% 50%, #FFB7C5 4px, transparent 4px),
    radial-gradient(circle at 10% 20%, #FF8FAD 3px, transparent 3px),
    linear-gradient(160deg, transparent 48%, #6B8E6B 49%, #6B8E6B 51%, transparent 52%) 0 0 / 100% 100%,
    linear-gradient(200deg, transparent 48%, #6B8E6B 49%, #6B8E6B 51%, transparent 52%) 0 0 / 100% 100%;
  animation: branchSway 5s ease-in-out infinite;
}
@keyframes branchSway {
  0%, 100% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(1.5deg) scale(1.02); }
}

/* 右下角花朵枝杈 */
.deco-branch-br {
  position: absolute; bottom: -10px; right: -10px;
  width: 130px; height: 150px;
  opacity: 0.5;
  background:
    radial-gradient(circle at 80% 25%, #FFD1DC 6px, transparent 6px),
    radial-gradient(circle at 55% 40%, #FFB7C5 5px, transparent 5px),
    radial-gradient(circle at 35% 20%, #FF8FAD 4px, transparent 4px),
    radial-gradient(circle at 70% 55%, #FFD1DC 7px, transparent 7px),
    radial-gradient(circle at 20% 35%, #FFB7C5 4px, transparent 4px),
    radial-gradient(circle at 50% 70%, #FF8FAD 3px, transparent 3px),
    linear-gradient(200deg, transparent 48%, #6B8E6B 49%, #6B8E6B 51%, transparent 52%) 0 0 / 100% 100%,
    linear-gradient(160deg, transparent 48%, #6B8E6B 49%, #6B8E6B 51%, transparent 52%) 0 0 / 100% 100%;
  animation: branchSwayBr 6s ease-in-out infinite;
}
@keyframes branchSwayBr {
  0%, 100% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(-2deg) scale(1.03); }
}

/* 浮动云朵 */
.deco-cloud { position: absolute; background: rgba(255,255,255,0.7); border-radius: 50px; }
.deco-cloud-1 {
  top: 50px; left: -30px; width: 100px; height: 36px;
  animation: cloudDrift 20s ease-in-out infinite;
  box-shadow: 40px -10px 0 -5px rgba(255,255,255,0.6), 20px -18px 0 -8px rgba(255,255,255,0.5);
}
.deco-cloud-2 {
  top: 90px; right: -20px; width: 70px; height: 28px;
  animation: cloudDrift 28s ease-in-out infinite reverse;
  box-shadow: 25px -8px 0 -4px rgba(255,255,255,0.5);
}
@keyframes cloudDrift {
  0%, 100% { transform: translateX(0) translateY(0); }
  33% { transform: translateX(25px) translateY(-5px); }
  66% { transform: translateX(-10px) translateY(3px); }
}

/* 浮动花朵精灵 */
.deco-flower {
  position: absolute; font-size: 22px;
  animation: floatBloom ease-in-out infinite;
  filter: drop-shadow(0 2px 4px rgba(255,143,173,0.3));
}
.deco-flower-1 { top: 20%; left: 6%;  animation-duration: 7s; animation-delay: 0s; }
.deco-flower-2 { top: 38%; right: 8%; font-size: 17px; animation-duration: 9s; animation-delay: 2s; }
.deco-flower-3 { bottom: 32%; left: 4%; font-size: 20px; animation-duration: 8s; animation-delay: 1s; }
.deco-flower-4 { bottom: 20%; right: 6%; font-size: 24px; animation-duration: 6s; animation-delay: 3s; }
.deco-flower-5 { top: 60%; left: 2%; font-size: 15px; animation-duration: 10s; animation-delay: 0.5s; }
@keyframes floatBloom {
  0%, 100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.85; }
  25% { transform: translateY(-8px) rotate(6deg) scale(1.05); opacity: 1; }
  75% { transform: translateY(5px) rotate(-4deg) scale(0.97); opacity: 0.9; }
}

/* 蝴蝶 1 - 左上区域 */
.deco-butterfly {
  position: absolute; font-size: 16px;
  animation: butterflyDance ease-in-out infinite;
  filter: drop-shadow(0 0 6px rgba(168,216,234,0.5));
}
.butterfly-1 { top: 28%; left: 10%; animation-duration: 8s; animation-delay: 1s; }
.butterfly-2 { top: 52%; right: 8%; font-size: 13px; animation-duration: 11s; animation-delay: 4s; }
@keyframes butterflyDance {
  0%   { transform: translate(0, 0) rotate(0deg) scaleX(1); }
  20%  { transform: translate(12px, -18px) rotate(10deg) scaleX(1); }
  40%  { transform: translate(-5px, -30px) rotate(-8deg) scaleX(-1); }
  60%  { transform: translate(18px, -15px) rotate(12deg) scaleX(1); }
  80%  { transform: translate(5px, 5px) rotate(-5deg) scaleX(-1); }
  100% { transform: translate(0, 0) rotate(0deg) scaleX(1); }
}

/* 小萤火虫/光点 */
.deco-sparkle {
  position: absolute; width: 5px; height: 5px;
  background: radial-gradient(circle, #FFD700 0%, rgba(255,215,0,0.4) 60%, transparent 100%);
  border-radius: 50%; pointer-events: none;
  animation: sparkleFloat ease-in-out infinite;
}
@keyframes sparkleFloat {
  0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); }
  50% { opacity: 0.9; transform: translateY(-15px) scale(1.2); }
}

/* 温馨草地底部 */
.deco-grass {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 60px; pointer-events: none;
  background:
    radial-gradient(ellipse 80px 30px at 10% 100%, rgba(139,195,139,0.4) 0%, transparent 70%),
    radial-gradient(ellipse 60px 25px at 25% 100%, rgba(168,197,160,0.35) 0%, transparent 70%),
    radial-gradient(ellipse 90px 35px at 45% 100%, rgba(139,195,139,0.3) 0%, transparent 70%),
    radial-gradient(ellipse 70px 28px at 65% 100%, rgba(168,197,160,0.35) 0%, transparent 70%),
    radial-gradient(ellipse 85px 32px at 85% 100%, rgba(139,195,139,0.4) 0%, transparent 70%),
    radial-gradient(ellipse 100px 40px at 95% 100%, rgba(168,197,160,0.3) 0%, transparent 70%);
  animation: grassWave 4s ease-in-out infinite;
}
@keyframes grassWave {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(1.08); }
}

/* 登录页 */
.login-card { background: var(--card-bg); border-radius: var(--radius); padding: 40px 28px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-top: 60px; position: relative; z-index: 1; }
.login-card h2 { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 600; color: var(--text-dark); margin-bottom: 6px; text-align: center; }
.login-card p { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 28px; }
.login-input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; font-family: 'Noto Sans SC', sans-serif; color: var(--text-dark); background: var(--bg); outline: none; transition: border-color 0.2s; margin-bottom: 16px; text-align: center; letter-spacing: 2px; }
.login-input:focus { border-color: var(--gold); }
.login-input::placeholder { color: #c4b49a; }
.login-btn { width: 100%; padding: 14px; background: var(--gold); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 16px; font-family: 'Noto Sans SC', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.login-btn:hover { background: #b8952f; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(201,168,76,0.3); }

/* 进度卡片 */
.progress-card { background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 20px; }
.progress-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.day-badge { font-family: 'Noto Serif SC', serif; font-size: 13px; color: var(--gold); font-weight: 600; background: var(--gold-light); padding: 4px 12px; border-radius: 20px; }
.streak-info { font-size: 12px; color: var(--text-muted); }
.streak-info strong { color: var(--gold); font-weight: 600; }
.progress-title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 600; color: var(--text-dark); margin-bottom: 14px; }
.progress-bar-wrap { background: var(--border); border-radius: 8px; height: 6px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #e8c96a); border-radius: 8px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
.progress-stats { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; color: var(--text-muted); }
.progress-stats strong { color: var(--text-dark); }
.medals { display: flex; align-items: center; gap: 6px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.medals-label { font-size: 12px; color: var(--text-muted); margin-right: 4px; }
.medal { width: 28px; height: 28px; border-radius: 50%; background: var(--gold); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(201,168,76,0.3); }
.medal-empty { background: var(--medal-inactive); color: transparent; box-shadow: none; }

/* 任务 */
.tasks-section { margin-bottom: 20px; }
.section-label { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 12px; font-weight: 500; }
.task-card { background: var(--card-bg); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 12px; transition: all 0.2s; }
.task-card:hover { box-shadow: var(--shadow-hover); }
.task-card.checked { border-color: var(--green); background: var(--green-light); }
.task-top { display: flex; align-items: center; gap: 12px; }
.task-check-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; color: transparent; font-size: 12px; }
.task-card.checked .task-check-btn { background: var(--green); border-color: var(--green); color: #fff; }
.task-check-btn[disabled] { opacity: 0.4; cursor: not-allowed; }
.task-info { flex: 1; }
.task-name { font-size: 15px; font-weight: 500; color: var(--text-dark); margin-bottom: 2px; }
.task-desc { font-size: 12px; color: var(--text-muted); }
.task-star { font-size: 12px; color: var(--gold); font-weight: 600; }
.task-textarea { width: 100%; margin-top: 12px; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: 'Noto Sans SC', sans-serif; color: var(--text-dark); background: var(--bg); resize: none; outline: none; line-height: 1.6; min-height: 70px; transition: border-color 0.2s; }
.task-textarea:focus { border-color: var(--gold); }
.task-textarea::placeholder { color: #c4b49a; }
.task-textarea[readonly] { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
.task-card-optional { opacity: 0.85; }
.task-card-optional .task-name { color: var(--text-muted); }
.task-optional-tag { font-size: 10px; color: var(--text-muted); background: var(--border); padding: 1px 6px; border-radius: 8px; margin-left: 4px; font-weight: 400; }

/* 提交 */
.submitted-banner { background: var(--green-light); border: 1px solid var(--green); border-radius: var(--radius-sm); padding: 8px 16px; text-align: center; margin-bottom: 12px; font-size: 13px; color: var(--green); font-weight: 500; }
.submit-section { margin: 20px 0; }
.submit-btn { width: 100%; padding: 16px; background: var(--gold); color: #fff; border: none; border-radius: var(--radius); font-size: 16px; font-family: 'Noto Sans SC', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(201,168,76,0.3); display: flex; flex-direction: column; align-items: center; gap: 2px; animation: submitPulse 2s ease-in-out infinite; }
@keyframes submitPulse { 0%, 100% { box-shadow: 0 4px 16px rgba(201,168,76,0.3); } 50% { box-shadow: 0 4px 28px rgba(201,168,76,0.55); } }
.submit-btn:hover { background: #b8952f; transform: translateY(-2px); }
.submit-btn small { font-size: 11px; font-weight: 400; opacity: 0.85; }

/* 日期导航 */
.date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.date-nav-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans SC', sans-serif; }
.date-nav-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
.date-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.current-date-label { font-size: 13px; color: var(--text-muted); }

/* Toast */
.toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--text-dark); color: #fff; padding: 10px 24px; border-radius: 40px; font-size: 14px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 9999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 动画 */
@keyframes checkPop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: fadeIn 0.4s ease-out forwards; }
.task-card.checked .task-check-btn { animation: checkPop 0.3s ease-out; }

/* 庆祝弹窗 */
.celebration-overlay { position: fixed; inset: 0; background: rgba(61, 46, 30, 0.5); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 24px; }
.celebration-card { background: var(--card-bg); border-radius: 24px; padding: 36px 28px; max-width: 340px; width: 100%; text-align: center; box-shadow: 0 16px 48px rgba(61, 46, 30, 0.2); border: 1.5px solid var(--gold-light); animation: cardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes cardPop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.celebration-icon { font-size: 52px; margin-bottom: 16px; display: block; }
.celebration-day { font-family: 'Noto Serif SC', serif; font-size: 13px; color: var(--gold); font-weight: 600; letter-spacing: 2px; margin-bottom: 10px; }
.celebration-quote { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 600; color: var(--text-dark); line-height: 1.7; margin-bottom: 24px; }
.celebration-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }
.celebration-medal { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #C9A84C, #F5D97A); color: #fff; font-size: 28px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 4px 16px rgba(201, 168, 76, 0.5); animation: medalShine 2s ease-in-out infinite; }
@keyframes medalShine { 0%, 100% { box-shadow: 0 4px 16px rgba(201,168,76,0.5); } 50% { box-shadow: 0 4px 32px rgba(201,168,76,0.8), 0 0 60px rgba(245,217,122,0.4); } }
.celebration-close { width: 100%; padding: 12px; background: var(--gold); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-family: 'Noto Sans SC', sans-serif; cursor: pointer; }
.celebration-close:hover { background: #b8952f; }

/* 烟花 */
.fireworks-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 8999; }

/* ========== 营长端样式 ========== */
.admin-stats-bar { display: flex; gap: 12px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
.stat-pill { background: var(--card-bg); border: 1px solid var(--border); border-radius: 40px; padding: 8px 16px; font-size: 13px; white-space: nowrap; flex-shrink: 0; }
.stat-pill strong { color: var(--gold); font-weight: 600; }
.student-card { background: var(--card-bg); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 12px; }
.student-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.student-name { font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 600; color: var(--text-dark); }
.student-badges { display: flex; gap: 6px; align-items: center; }
.badge-sm { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 500; }
.badge-gold { background: var(--gold-light); color: var(--gold); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-muted { background: var(--border); color: var(--text-muted); }
.student-task-status { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
.today-progress-wrap { background: var(--border); border-radius: 6px; height: 4px; overflow: hidden; }
.today-progress-fill { height: 100%; background: var(--green); border-radius: 6px; transition: width 0.4s; }
.admin-actions { display: flex; gap: 8px; margin-top: 12px; }
.admin-btn { flex: 1; padding: 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans SC', sans-serif; color: var(--text-muted); }
.admin-btn:hover { border-color: var(--gold); color: var(--gold); }
.admin-btn.danger:hover { border-color: #e57373; color: #e57373; }
.no-students { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }
.no-students-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
.export-panel { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 20px; }
.export-panel h4 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-dark); }
.export-row { display: flex; gap: 8px; flex-wrap: wrap; }
.export-btn { padding: 8px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans SC', sans-serif; color: var(--text-muted); }
.export-btn:hover { border-color: var(--gold); color: var(--gold); }
.export-btn.primary { background: var(--gold); border-color: var(--gold); color: #fff; }
.export-btn.primary:hover { background: #b8952f; }

/* 详情弹窗 */
.modal-overlay { position: fixed; inset: 0; background: rgba(61,46,30,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-card { background: var(--card-bg); border-radius: var(--radius); padding: 28px; max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.modal-stat { background: var(--gold-light); padding: 12px; border-radius: 10px; text-align: center; }
.modal-stat-num { font-size: 22px; font-weight: 700; color: var(--gold); }
.modal-stat-label { font-size: 11px; color: var(--text-muted); }

/* 响应式 */
@media (max-width: 480px) { .container { padding: 0 16px 80px; } .progress-card { padding: 20px; } }

/* 密码弹窗 */
.password-modal-overlay { position: fixed; inset: 0; background: rgba(61,46,30,0.45); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.password-modal { background: var(--card-bg); border-radius: var(--radius); padding: 36px 28px; max-width: 320px; width: 100%; text-align: center; box-shadow: 0 16px 48px rgba(61,46,30,0.18); border: 1.5px solid var(--gold-light); }
.password-modal-icon { font-size: 36px; margin-bottom: 12px; }
.password-modal-title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 600; color: var(--text-dark); margin-bottom: 6px; }
.password-modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
.password-input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 18px; font-family: 'Noto Sans SC', sans-serif; color: var(--text-dark); background: var(--bg); outline: none; text-align: center; letter-spacing: 8px; transition: border-color 0.2s; margin-bottom: 16px; }
.password-input:focus { border-color: var(--gold); }
.password-error { font-size: 12px; color: #e57373; margin-bottom: 12px; display: none; }
.password-modal-btns { display: flex; gap: 10px; }
.password-modal-btns button { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 14px; font-family: 'Noto Sans SC', sans-serif; cursor: pointer; transition: all 0.2s; }
.password-cancel-btn { background: transparent; border: 1.5px solid var(--border); color: var(--text-muted); }
.password-cancel-btn:hover { border-color: var(--text-muted); color: var(--text-dark); }
.password-confirm-btn { background: var(--gold); border: none; color: #fff; }
.password-confirm-btn:hover { background: #b8952f; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
// ========== 共享配置 ==========
const STORAGE_KEY = 'guixu_checkin_data_v2';
const DEFAULT_TASKS = [
  { id: 'morning_water',  name: '早起温水', desc: '温饮归元  唤醒身体', type: 'single', star: 1, required: true },
  { id: 'life_anchor',    name: '生活锚点', desc: '给自己设一个小确幸：整理一处小空间，或者每小时站起来运动3分钟…… 在这个锚点里，你不是谁的谁，你只是你自己。', type: 'text', star: 1, required: true },
  { id: 'evening_review', name: '晚间复盘', desc: '睡前5分钟想想：今天让你微笑的小事，或者想感谢的人。\n不管今天过得如何，辛苦啦，现在的你很棒！', type: 'text', star: 1, required: true },
  { id: 'breakfast',      name: '早餐',     desc: '慢品晨光，温养此心',   type: 'single', star: 1, required: false },
  { id: 'lunch',          name: '中餐',     desc: '细嚼慢咽，观照当下',   type: 'single', star: 1, required: false },
  { id: 'dinner',         name: '晚餐',     desc: '卸下尘劳，好好吃饭',   type: 'single', star: 1, required: false },
];
const DAY_QUOTES = [
  '你的出发，比完美更重要。',
  '做到的每一件小事，都是内在秩序的一块砖。',
  '一个锚点，胜过一千个计划。',
  '让复盘成为每日的礼物。',
  '进步不是线性的，是每一个"微小动作"的叠加。',
  '每一刻的觉知，都是光。',
  null,
];
const DAY7_QUOTE = '所谓奇迹，不过是平凡人坚持了不平凡的7天。\n恭喜你，完成了这场自我进化的穿越之旅。';

// ========== 工具函数 ==========
function todayStr() { return new Date().toISOString().split('T')[0]; }
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  return `${d.getMonth()+1}月${d.getDate()}日 ${weekdays[d.getDay()]}`;
}
function getDayNumber(firstCheckIn, now) {
  const start = new Date(firstCheckIn + 'T12:00:00');
  const end = new Date(now + 'T12:00:00');
  return Math.floor((end - start) / 86400000) + 1;
}
function getConsecutiveDays(checkInDays) {
  if (!checkInDays || checkInDays.length === 0) return 0;
  const sorted = [...checkInDays].sort();
  let consecutive = 1;
  for (let i = sorted.length - 1; i > 0; i--) {
    const diff = (new Date(sorted[i]+'T12:00:00') - new Date(sorted[i-1]+'T12:00:00')) / 86400000;
    if (diff === 1) consecutive++; else break;
  }
  return consecutive;
}
function getMedalCount(student) { return Math.floor((student.checkInDays?.length || 0) / 7); }
function getData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function getStudent(name) { return getData().students?.[name] || null; }
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function ensureTasksForDay(name, dateStr) {
  const data = getData();
  const stu = data.students[name];
  if (!stu.tasks[dateStr]) {
    stu.tasks[dateStr] = {};
    DEFAULT_TASKS.forEach(t => { stu.tasks[dateStr][t.id] = t.type === 'text' ? '' : false; });
  }
  saveData(data);
  return stu.tasks[dateStr];
}
function calcTodayStars(student, dateStr) {
  const dayTasks = student.tasks?.[dateStr];
  if (!dayTasks) return { done: 0, total: DEFAULT_TASKS.reduce((s,t) => s+t.star, 0) };
  let done = 0;
  DEFAULT_TASKS.forEach(t => {
    if (t.type === 'text') { if (dayTasks[t.id]?.trim().length > 0) done += t.star; }
    else { if (dayTasks[t.id]) done += t.star; }
  });
  return { done, total: DEFAULT_TASKS.reduce((s,t) => s+t.star, 0) };
}
function calcTotalStars(student) {
  let total = 0;
  Object.values(student.tasks || {}).forEach(dayTasks => {
    DEFAULT_TASKS.forEach(t => {
      if (t.type === 'text') { if (dayTasks[t.id]?.trim().length > 0) total += t.star; }
      else { if (dayTasks[t.id]) total += t.star; }
    });
  });
  return total;
}
function isRequiredDone(student, dateStr) {
  const dayTasks = student.tasks?.[dateStr];
  if (!dayTasks) return false;
  for (const t of DEFAULT_TASKS) {
    if (!t.required) continue;
    if (t.type === 'text') { if (!dayTasks[t.id]?.trim()) return false; }
    else { if (!dayTasks[t.id]) return false; }
  }
  return true;
}

// ========== 烟花引擎 ==========
const fireworks = [];
let fwCanvas, fwCtx, fwAnimId, fwInterval;
function createFireworksCanvas() {
  let c = document.getElementById('fireworksCanvas');
  if (!c) { c = document.createElement('canvas'); c.id = 'fireworksCanvas'; c.className = 'fireworks-canvas'; document.body.appendChild(c); }
  c.width = window.innerWidth; c.height = window.innerHeight;
  return c;
}
function randomColor() { return ['#C9A84C','#F5D97A','#7BAE7F','#F9C27C','#E8A0BF','#A8D8EA','#FF9A8B'][Math.floor(Math.random()*7)]; }
function createParticle(x, y, color) {
  const angle = Math.random() * Math.PI * 2;
  const speed = Math.random() * 6 + 2;
  return { x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, alpha: 1, color, decay: Math.random()*0.02+0.015, size: Math.random()*3+1 };
}
function startFireworks(big = false) {
  // 清理旧烟花
  if (fwAnimId) cancelAnimationFrame(fwAnimId);
  if (fwInterval) clearInterval(fwInterval);
  fireworks.length = 0;
  const oldCanvas = document.getElementById('fireworksCanvas');
  if (oldCanvas) oldCanvas.remove();

  fwCanvas = createFireworksCanvas();
  fwCtx = fwCanvas.getContext('2d');
  for (let i = 0; i < (big?8:4); i++) setTimeout(() => launchRocket(big), i*200);
  fwInterval = setInterval(() => { for (let i=0; i<(big?3:1); i++) launchRocket(big); }, big?600:1200);
  function launchRocket(big) {
    const x = Math.random()*fwCanvas.width*0.8 + fwCanvas.width*0.1;
    const y = fwCanvas.height*0.3 + Math.random()*fwCanvas.height*0.3;
    fireworks.push({ x, y, targetY: y-(big?200:120)-Math.random()*100, vy:-10, color: randomColor(), big, particles:[], exploded:false });
  }
  function animate() {
    fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
    for (let i = fireworks.length-1; i >= 0; i--) {
      const fw = fireworks[i];
      if (!fw.exploded) {
        fw.vy += 0.3; fw.y += fw.vy; fw.x += (Math.random()-0.5)*2;
        fwCtx.beginPath(); fwCtx.arc(fw.x, fw.y, fw.big?4:2.5, 0, Math.PI*2);
        fwCtx.fillStyle = fw.color; fwCtx.globalAlpha = 0.9; fwCtx.fill();
        fwCtx.beginPath(); fwCtx.moveTo(fw.x, fw.y); fwCtx.lineTo(fw.x, fw.y-15);
        const grad = fwCtx.createLinearGradient(fw.x, fw.y, fw.x, fw.y-15);
        grad.addColorStop(0, fw.color+'AA'); grad.addColorStop(1, 'transparent');
        fwCtx.strokeStyle = grad; fwCtx.lineWidth = fw.big?3:2; fwCtx.stroke();
        if (fw.vy >= 0 || fw.y <= fw.targetY) {
          fw.exploded = true;
          for (let j=0; j<(fw.big?80:40); j++) fw.particles.push(createParticle(fw.x, fw.y, fw.color));
        }
      } else {
        for (let j=fw.particles.length-1; j>=0; j--) {
          const p = fw.particles[j];
          p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.vx *= 0.98; p.alpha -= p.decay;
          if (p.alpha <= 0) { fw.particles.splice(j,1); continue; }
          fwCtx.beginPath(); fwCtx.arc(p.x, p.y, p.size, 0, Math.PI*2);
          fwCtx.fillStyle = p.color; fwCtx.globalAlpha = p.alpha; fwCtx.fill();
        }
        fwCtx.globalAlpha = 1;
        if (fw.particles.length === 0) fireworks.splice(i,1);
      }
    }
    if (fireworks.length > 0) fwAnimId = requestAnimationFrame(animate);
    else {
      cancelAnimationFrame(fwAnimId);
      fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
    }
  }
  animate();
  setTimeout(() => {
    if (fwInterval) clearInterval(fwInterval);
    if (fwAnimId) cancelAnimationFrame(fwAnimId);
    if (fwCtx) fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
    fireworks.length = 0;
  }, big?6000:4000);
}

// ========== 庆祝弹窗 ==========
function showCelebration({ dayNum, isDay7 }) {
  const overlay = document.createElement('div');
  overlay.className = 'celebration-overlay';
  overlay.innerHTML = `
    <div class="celebration-card">
      ${isDay7 ? `<div class="celebration-medal">7</div>` : `<span class="celebration-icon">${['🌱','🌿','🌾','🍃','🪴','☘️'][dayNum-1] || '🌸'}</span>`}
      <div class="celebration-day">第 ${dayNum} 天打卡完成</div>
      <div class="celebration-quote">${(isDay7 ? DAY7_QUOTE : (DAY_QUOTES[dayNum-1] || '')).replace(/\n/g,'<br>')}</div>
      <div class="celebration-sub">${isDay7 ? '你坚持了整整7天，这是属于你的勋章。' : '今日任务全部完成，你正在书写自己的节律。'}</div>
      <button class="celebration-close" id="celebrationCloseBtn">太棒了！</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.getElementById('celebrationCloseBtn').addEventListener('click', () => overlay.remove());
}

// ========== 学员端 ==========
let currentStudent = null;
let currentViewDate = todayStr();

function renderLogin() {
  const savedName = localStorage.getItem('guixu_current_student') || '';
  document.getElementById('app').innerHTML = `
    <div class="spring-decor" aria-hidden="true">
      <div class="deco-sun"></div>
      <div class="deco-branch-tl"></div>
      <div class="deco-branch-br"></div>
      <div class="deco-cloud deco-cloud-1"></div>
      <div class="deco-cloud deco-cloud-2"></div>
      <div class="deco-flower deco-flower-1">🌸</div>
      <div class="deco-flower deco-flower-2">🌷</div>
      <div class="deco-flower deco-flower-3">🌱</div>
      <div class="deco-flower deco-flower-4">🌼</div>
      <div class="deco-flower deco-flower-5">🌿</div>
      <div class="deco-butterfly butterfly-1">🦋</div>
      <div class="deco-butterfly butterfly-2">🦋</div>
      <div class="deco-sparkle" style="top:30%;left:20%;animation-duration:3s;animation-delay:0s"></div>
      <div class="deco-sparkle" style="top:45%;right:15%;animation-duration:4s;animation-delay:1.5s"></div>
      <div class="deco-sparkle" style="top:60%;left:10%;animation-duration:3.5s;animation-delay:0.8s"></div>
      <div class="deco-sparkle" style="bottom:30%;right:20%;animation-duration:4.5s;animation-delay:2s"></div>
      <div class="deco-grass"></div>
      <div class="petal" style="left:10%;animation-duration:7s;animation-delay:0s"></div>
      <div class="petal" style="left:25%;animation-duration:9s;animation-delay:1.5s"></div>
      <div class="petal" style="left:40%;animation-duration:8s;animation-delay:0.8s"></div>
      <div class="petal" style="left:55%;animation-duration:11s;animation-delay:2.5s"></div>
      <div class="petal" style="left:70%;animation-duration:7.5s;animation-delay:1s"></div>
      <div class="petal" style="left:85%;animation-duration:10s;animation-delay:3s"></div>
      <div class="petal" style="left:15%;animation-duration:12s;animation-delay:4s"></div>
    </div>
    <div class="header">
      <div class="header-logo">归 序</div>
      <div class="camp-name">7日营 · 打卡工具</div>
    </div>
    <div class="login-card animate-in">
      <h2>欢迎回来</h2>
      <p>输入你的名字，即可开始今日打卡</p>
      <input class="login-input" type="text" id="nameInput" placeholder="请输入你的名字" value="${savedName}" maxlength="20" autocomplete="off" />
      <button class="login-btn" id="enterBtn">进入打卡</button>
    </div>`;
  document.getElementById('enterBtn').addEventListener('click', doLogin);
  document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
  setTimeout(() => document.getElementById('nameInput')?.focus(), 100);
}

function doLogin() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showToast('请输入名字'); return; }
  localStorage.setItem('guixu_current_student', name);
  currentStudent = name;
  currentViewDate = todayStr();
  initStudent(name);
  renderStudentApp();
}

function initStudent(name) {
  const data = getData();
  if (!data.students) data.students = {};
  const today = todayStr();
  if (!data.students[name]) {
    data.students[name] = { firstCheckIn: today, checkInDays: [], tasks: {}, totalStars: 0, submittedDates: [] };
  } else {
    const stu = data.students[name];
    if (!stu.submittedDates) stu.submittedDates = [];
    if (!stu.tasks) stu.tasks = {};
  }
  saveData(data);
  return data.students[name];
}

function renderStudentApp() {
  const student = getStudent(currentStudent);
  if (!student) {
    // 数据丢失，清除残留状态，重新登录
    localStorage.removeItem('guixu_current_student');
    currentStudent = null;
    currentViewDate = todayStr();
    renderLogin();
    return;
  }

  const app = document.getElementById('app');
  const today = todayStr();
  // 始终以今天作为基准计算，第几天从 firstCheckIn 算起
  const dayNum = getDayNumber(student.firstCheckIn, today);
  const consecutive = getConsecutiveDays(student.checkInDays);
  const medals = getMedalCount(student);

  // 始终以今日视图为主，避免 currentViewDate 停留在旧日期导致 canEdit 出错
  const viewDate = today;
  const { done: todayDone, total: todayTotal } = calcTodayStars(student, viewDate);
  const progressPct = todayTotal > 0 ? Math.round((todayDone/todayTotal)*100) : 0;
  const isSubmitted = student.submittedDates?.includes(viewDate) || false;
  // 只有今天且未提交时才能编辑
  const canEdit = (viewDate === today) && !isSubmitted;

  let medalsHtml = '';
  for (let i = 0; i < 4; i++) {
    if (i < medals) medalsHtml += `<div class="medal" title="7日勋章">7</div>`;
    else medalsHtml += `<div class="medal medal-empty" title="还需${(i+1)*7 - (student.checkInDays?.length||0)}天解锁">7</div>`;
  }

  // 生成7天日期列表
  const dates = [];
  const baseDate = new Date(); baseDate.setHours(0,0,0,0);
  for (let i=0; i<7; i++) { const d = new Date(baseDate); d.setDate(d.getDate()+i); dates.push(d.toISOString().split('T')[0]); }
  const currentIdx = dates.indexOf(viewDate);

  let tasksHtml = DEFAULT_TASKS.map(task => {
    const dayTasks = ensureTasksForDay(currentStudent, viewDate);
    let checked = false, subHtml = '';
    if (task.type === 'text') {
      const textVal = dayTasks[task.id] || '';
      checked = textVal.trim().length > 0;
      subHtml = `<textarea class="task-textarea" data-task="${task.id}" placeholder="${task.desc}" ${!canEdit?'readonly':''}>${textVal}</textarea>`;
    } else {
      checked = !!dayTasks[task.id];
    }
    const optionalTag = !task.required ? `<span class="task-optional-tag">可选</span>` : '';
    return `<div class="task-card ${checked&&canEdit?'checked':''} ${!task.required?'task-card-optional':''}" data-task-id="${task.id}">
      <div class="task-top">
        <button class="task-check-btn" data-task="${task.id}" ${!canEdit?'disabled':''}>✓</button>
        <div class="task-info">
          <div class="task-name">${task.name} ${optionalTag}</div>
          ${task.type !== 'text' ? `<div class="task-desc">${task.desc}</div>` : ''}
        </div>
        <div class="task-star">+${task.star}★</div>
      </div>
      ${subHtml}
    </div>`;
  }).join('');

  const requiredDone = isRequiredDone(student, today);
  const showSubmitBtn = canEdit && requiredDone;

  app.innerHTML = `
    <div class="header">
      <div class="spring-decor" aria-hidden="true">
        <div class="deco-flower" style="top:8px;left:8px;font-size:14px;animation-duration:9s">🌸</div>
        <div class="deco-flower" style="top:5px;right:40px;font-size:11px;animation-duration:7s">🌷</div>
        <div class="deco-butterfly butterfly-1" style="top:10px;right:10px;font-size:12px;animation-duration:12s">🦋</div>
        <div class="deco-sparkle" style="top:15px;left:50%;animation-duration:3.5s"></div>
      </div>
      <div class="header-logo">归 序</div>
      <div class="camp-name">7日营 · 打卡工具</div>
    </div>
    <div class="container">
      <div class="role-tabs">
        <button class="role-tab active">学员打卡</button>
        <button class="role-tab" id="goAdminBtn">营长入口</button>
      </div>
      ${isSubmitted ? `<div class="submitted-banner"><span>✓ 今日已提交打卡</span></div>` : ''}
      <div class="progress-card animate-in">
        <div class="progress-header">
          <span class="day-badge">第 ${dayNum} 天</span>
          <span class="streak-info">连续 <strong>${consecutive}</strong> 天</span>
        </div>
        <div class="progress-title">${'今日打卡'}</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progFill" style="width:${progressPct}%"></div></div>
        <div class="progress-stats" id="progStats">
          <span>已完成 <strong>${todayDone}</strong> / ${todayTotal} 项</span>
          <span>累计 <strong>${calcTotalStars(student)}</strong> ★</span>
        </div>
        <div class="medals">
          <span class="medals-label">7日勋章</span>
          ${medalsHtml}
          ${medals===0 ? `<span style="font-size:12px;color:#c4b49a">还需${7-(student.checkInDays?.length||0)}天解锁</span>` : ''}
        </div>
      </div>
      <div class="date-nav">
        <button class="date-nav-btn" id="prevDay" ${currentIdx<=0?'disabled':''}>◀ 上一天</button>
        <span class="current-date-label">${formatDate(viewDate)}</span>
        <button class="date-nav-btn" id="nextDay" disabled>下一天 ▶</button>
      </div>
      <div class="tasks-section">
        <div class="section-label">每日任务</div>
        ${tasksHtml}
      </div>
      ${showSubmitBtn ? `<div class="submit-section"><button class="submit-btn" id="submitDayBtn"><span>提交今日打卡</span><small>完成所有必填项后解锁</small></button></div>` : ''}
      <div style="text-align:center;margin-top:24px;">
        <button id="switchStudent" style="background:none;border:none;color:#c4b49a;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;text-decoration:underline">切换账号 / 重新开始</button>
      </div>
    </div>`;

  // 事件绑定（统一用 app 层委托，避免每次重渲染后遗漏）
  app.addEventListener('click', e => {
    const btn = e.target.closest('.task-check-btn:not([disabled])');
    if (btn) {
      e.stopPropagation();
      toggleTask(btn.getAttribute('data-task'));
      return;
    }
    if (e.target.id === 'submitDayBtn') { handleSubmit(); return; }
    if (e.target.id === 'switchStudent') {
      localStorage.removeItem('guixu_current_student');
      currentStudent = null;
      currentViewDate = todayStr();
      renderLogin();
      return;
    }
    if (e.target.id === 'prevDay') {
      const idx = dates.indexOf(viewDate);
      if (idx > 0) {
        // 上一天设为查看模式（readonly）
        const prevDate = dates[idx - 1];
        renderDayView(prevDate);
      }
      return;
    }
    if (e.target.id === 'goAdminBtn') { showAdminPasswordPrompt(); return; }
  }, true);

  app.addEventListener('input', e => {
    if (e.target.classList.contains('task-textarea') && !e.target.readOnly) {
      saveTextTask(e.target.getAttribute('data-task'), e.target.value);
    }
  }, true);
}

// 查看某一天的历史记录（只读）
function renderDayView(dateStr) {
  const student = getStudent(currentStudent);
  if (!student) return;
  const app = document.getElementById('app');
  const today = todayStr();
  const dayNum = getDayNumber(student.firstCheckIn, dateStr);
  const { done, total } = calcTodayStars(student, dateStr);
  const isSubmitted = student.submittedDates?.includes(dateStr) || false;

  const dates = [];
  const baseDate = new Date(); baseDate.setHours(0,0,0,0);
  for (let i=0; i<7; i++) { const d = new Date(baseDate); d.setDate(d.getDate()+i); dates.push(d.toISOString().split('T')[0]); }
  const currentIdx = dates.indexOf(dateStr);

  let tasksHtml = DEFAULT_TASKS.map(task => {
    const dayTasks = student.tasks?.[dateStr] || {};
    let checked = false, subHtml = '';
    if (task.type === 'text') {
      const textVal = dayTasks[task.id] || '';
      checked = textVal.trim().length > 0;
      subHtml = `<textarea class="task-textarea" data-task="${task.id}" readonly>${textVal}</textarea>`;
    } else {
      checked = !!dayTasks[task.id];
    }
    const optionalTag = !task.required ? `<span class="task-optional-tag">可选</span>` : '';
    return `<div class="task-card ${checked?'checked':''} ${!task.required?'task-card-optional':''}" data-task-id="${task.id}">
      <div class="task-top">
        <button class="task-check-btn" data-task="${task.id}" disabled>✓</button>
        <div class="task-info">
          <div class="task-name">${task.name} ${optionalTag}</div>
          ${task.type !== 'text' ? `<div class="task-desc">${task.desc}</div>` : ''}
        </div>
        <div class="task-star">+${task.star}★</div>
      </div>
      ${subHtml}
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="header">
      <div class="spring-decor" aria-hidden="true">
        <div class="deco-flower" style="top:8px;left:8px;font-size:13px;animation-duration:8s">🌸</div>
        <div class="deco-butterfly butterfly-2" style="top:8px;right:10px;font-size:11px;animation-duration:14s">🦋</div>
      </div>
      <div class="header-logo">归 序</div>
      <div class="camp-name">7日营 · 打卡工具</div>
    </div>
    <div class="container">
      <div class="role-tabs">
        <button class="role-tab active">学员打卡</button>
        <button class="role-tab" id="goAdminBtn2">营长入口</button>
      </div>
      ${isSubmitted ? `<div class="submitted-banner"><span>✓ 当日已提交打卡</span></div>` : ''}
      <div class="progress-card animate-in">
        <div class="progress-header">
          <span class="day-badge">第 ${dayNum} 天</span>
          <span class="streak-info" style="font-size:12px;color:#c4b49a">历史记录</span>
        </div>
        <div class="progress-title">${formatDate(dateStr)} 打卡记录</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${total>0?Math.round(done/total*100):0}%"></div></div>
        <div class="progress-stats">
          <span>完成 <strong>${done}</strong> / ${total} 项</span>
        </div>
      </div>
      <div class="date-nav">
        <button class="date-nav-btn" id="prevDay2" ${currentIdx<=0?'disabled':''}>◀ 上一天</button>
        <span class="current-date-label">${formatDate(dateStr)}</span>
        <button class="date-nav-btn" id="nextDay2" ${currentIdx>=dates.length-1||dateStr===today?'disabled':''} onclick="renderStudentApp()">今天 ▶</button>
      </div>
      <div class="tasks-section">
        <div class="section-label">每日任务</div>
        ${tasksHtml}
      </div>
      <div style="text-align:center;margin-top:24px;">
        <button onclick="renderStudentApp()" style="background:none;border:none;color:#c4b49a;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;text-decoration:underline">← 返回今日打卡</button>
      </div>
    </div>`;

  app.addEventListener('click', e => {
    if (e.target.id === 'goAdminBtn2') { showAdminPasswordPrompt(); return; }
    if (e.target.id === 'prevDay2') {
      const idx = dates.indexOf(dateStr);
      if (idx > 0) renderDayView(dates[idx - 1]);
      return;
    }
  }, true);
}

function toggleTask(taskId) {
  const data = getData();
  const student = data.students[currentStudent];
  const today = todayStr();
  ensureTasksForDay(currentStudent, today);
  const was = student.tasks[today][taskId];
  student.tasks[today][taskId] = !was;
  if (!was && !student.checkInDays.includes(today)) student.checkInDays.push(today);
  saveData(data);

  // 只更新 UI，不全量 re-render，保持滚动位置和输入焦点
  const taskCard = document.querySelector(`[data-task-id="${taskId}"]`);
  if (taskCard) {
    if (!was) taskCard.classList.add('checked');
    else taskCard.classList.remove('checked');
    const btn = taskCard.querySelector('.task-check-btn');
    if (btn) {
      if (!was) { btn.classList.add('checked'); btn.style.background = 'var(--green)'; btn.style.borderColor = 'var(--green)'; btn.style.color = '#fff'; }
      else { btn.classList.remove('checked'); btn.style.background = ''; btn.style.borderColor = ''; btn.style.color = ''; }
    }
  }
  updateProgress();
  if (!was) { const task = DEFAULT_TASKS.find(t=>t.id===taskId); showToast(`${task?.name||'任务'}打卡完成 ✓`); }
}

function updateProgress() {
  const student = getStudent(currentStudent);
  if (!student) return;
  const today = todayStr();
  const { done, total } = calcTodayStars(student, today);
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  const fill = document.getElementById('progFill');
  if (fill) fill.style.width = pct + '%';
  const stats = document.getElementById('progStats');
  if (stats) stats.innerHTML = `<span>已完成 <strong>${done}</strong> / ${total} 项</span><span>累计 <strong>${calcTotalStars(student)}</strong> ★</span>`;
  // 动态显示/隐藏提交按钮
  const reqDone = isRequiredDone(student, today);
  let submitSection = document.querySelector('.submit-section');
  if (reqDone && !submitSection) {
    const section = document.querySelector('.tasks-section');
    if (section) {
      const div = document.createElement('div');
      div.className = 'submit-section';
      div.innerHTML = `<button class="submit-btn" id="submitDayBtn"><span>提交今日打卡</span><small>完成所有必填项后解锁</small></button>`;
      section.after(div);
    }
  } else if (!reqDone && submitSection) {
    submitSection.remove();
  }
}

function handleSubmit() {
  const data = getData();
  const student = data.students[currentStudent];
  const today = todayStr();
  if (!isRequiredDone(student, today)) { showToast('请先完成所有必填任务'); return; }
  if (student.submittedDates?.includes(today)) { showToast('今日已提交'); return; }
  if (!student.submittedDates) student.submittedDates = [];
  student.submittedDates.push(today);
  if (!student.checkInDays.includes(today)) student.checkInDays.push(today);
  saveData(data);

  // 烟花在 DOM 更新之后触发
  startFireworks(false);
  setTimeout(() => {
    const stu = getStudent(currentStudent);
    const d = getDayNumber(stu.firstCheckIn, today);
    showCelebration({ dayNum: d, isDay7: d === 7 });
    // 重新渲染，进入已提交状态
    setTimeout(() => renderStudentApp(), 100);
  }, 400);
}

function saveTextTask(taskId, value) {
  const data = getData();
  const student = data.students[currentStudent];
  const today = todayStr();
  ensureTasksForDay(currentStudent, today);
  student.tasks[today][taskId] = value;
  if (value.trim().length > 0 && !student.checkInDays.includes(today)) student.checkInDays.push(today);
  saveData(data);

  // 更新 UI
  const taskCard = document.querySelector(`[data-task-id="${taskId}"]`);
  if (taskCard) {
    if (value.trim()) taskCard.classList.add('checked');
    else taskCard.classList.remove('checked');
  }
  updateProgress();
}

// ========== 营长端 ==========
const ADMIN_PASSWORD = '4266';

function showAdminPasswordPrompt() {
  const existing = document.getElementById('adminPwdOverlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.id = 'adminPwdOverlay';
  overlay.className = 'password-modal-overlay';
  overlay.innerHTML = `
    <div class="password-modal">
      <div class="password-modal-icon">🔐</div>
      <div class="password-modal-title">营长入口</div>
      <div class="password-modal-sub">请输入访问密码</div>
      <input type="password" class="password-input" id="adminPwdInput" maxlength="10" autocomplete="off" placeholder="●" />
      <div class="password-error" id="adminPwdError">密码错误，请重试</div>
      <div class="password-modal-btns">
        <button class="password-cancel-btn" id="adminPwdCancel">取消</button>
        <button class="password-confirm-btn" id="adminPwdConfirm">确认</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const input = document.getElementById('adminPwdInput');
  input.focus();
  document.getElementById('adminPwdCancel').addEventListener('click', () => overlay.remove());
  document.getElementById('adminPwdConfirm').addEventListener('click', checkAdminPassword);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') checkAdminPassword(); });
  function checkAdminPassword() {
    if (input.value === ADMIN_PASSWORD) {
      overlay.remove();
      renderAdmin();
    } else {
      document.getElementById('adminPwdError').style.display = 'block';
      input.value = '';
      input.focus();
    }
  }
}

function renderAdmin() {
  const data = getData();
  const students = data.students || {};
  const names = Object.keys(students);
  const today = todayStr();
  const app = document.getElementById('app');

  if (names.length === 0) {
    app.innerHTML = `
      <div class="header">
        <div class="header-logo">归 序</div>
        <div class="camp-name">7日营 · 营长面板</div>
      </div>
      <div class="container">
        <div class="role-tabs">
          <button class="role-tab" onclick="renderStudentApp()">学员打卡</button>
          <button class="role-tab active">营长入口</button>
        </div>
        <div class="no-students">
          <div class="no-students-icon">📋</div>
          <p>暂无学员数据</p>
          <p style="margin-top:6px;font-size:12px;color:#c4b49a;">等待学员在打卡工具中输入名字</p>
        </div>
      </div>`;
    return;
  }

  const totalStudents = names.length;
  const todayCheckedIn = names.filter(n => students[n].checkInDays?.includes(today)).length;
  const avgProgress = Math.round(names.reduce((s, n) => {
    const { done, total } = calcTodayStars(students[n], today);
    return s + (total>0 ? done/total : 0);
  }, 0) / totalStudents * 100);

  function getTaskStatusText(stu, dateStr) {
    const dayTasks = stu.tasks?.[dateStr] || {};
    const parts = [];
    DEFAULT_TASKS.forEach(t => {
      if (t.type === 'text') {
        parts.push(`${t.name}: ${dayTasks[t.id]?.trim() ? '✓' : '○'}`);
      } else {
        parts.push(`${t.name}: ${dayTasks[t.id] ? '✓' : '○'}`);
      }
    });
    return parts.join(' | ');
  }

  const studentCards = names.map(name => {
    const stu = students[name];
    const dayNum = getDayNumber(stu.firstCheckIn, today);
    const consecutive = getConsecutiveDays(stu.checkInDays);
    const medals = getMedalCount(stu);
    const { done, total } = calcTodayStars(stu, today);
    const pct = total>0 ? Math.round((done/total)*100) : 0;
    const todayDone = stu.checkInDays?.includes(today);
    const totalStars = calcTotalStars(stu);
    return `<div class="student-card">
      <div class="student-card-top">
        <div class="student-name">${name}</div>
        <div class="student-badges">
          <span class="badge-sm badge-gold">第${dayNum}天</span>
          ${todayDone ? '<span class="badge-sm badge-green">今日已打卡</span>' : '<span class="badge-sm badge-muted">今日未打卡</span>'}
        </div>
      </div>
      <div class="student-task-status">${getTaskStatusText(stu, today)}</div>
      <div style="font-size:12px;color:#8B7355;margin-bottom:6px;">连续 ${consecutive} 天 · 累计 ${totalStars} ★ · ${medals} 枚勋章</div>
      <div class="today-progress-wrap"><div class="today-progress-fill" style="width:${pct}%"></div></div>
      <div class="admin-actions">
        <button class="admin-btn" data-action="viewDetail" data-name="${name}">查看详情</button>
        <button class="admin-btn danger" data-action="clearStudent" data-name="${name}">清空数据</button>
      </div>
    </div>`;
  }).join('');

  const exportRows = (() => {
    const lines = ['姓名\t第X天\t日期\t早起温水\t生活锚点（文本）\t晚间复盘（文本）\t早餐\t中餐\t晚餐\t是否提交'];
    names.forEach(name => {
      const stu = students[name];
      if (!stu || !stu.checkInDays || stu.checkInDays.length === 0) return;
      const sortedDays = [...stu.checkInDays].sort();
      sortedDays.forEach(dateStr => {
        const dayNum = getDayNumber(stu.firstCheckIn, dateStr);
        const dayTasks = stu.tasks?.[dateStr] || {};
        const isSubbed = stu.submittedDates?.includes(dateStr) ? '✓ 已提交' : '✗ 未提交';
        const anchor = (dayTasks['life_anchor'] || '').replace(/\t|\n/g, ' ');
        const review = (dayTasks['evening_review'] || '').replace(/\t|\n/g, ' ');
        lines.push(`${name}\t${dayNum}\t${dateStr}\t${dayTasks['morning_water']?'✓':'✗'}\t${anchor}\t${review}\t${dayTasks['breakfast']?'✓':'✗'}\t${dayTasks['lunch']?'✓':'✗'}\t${dayTasks['dinner']?'✓':'✗'}\t${isSubbed}`);
      });
    });
    return lines.join('\n');
  })();

  app.innerHTML = `
    <div class="header">
      <div class="header-logo">归 序</div>
      <div class="camp-name">7日营 · 营长面板</div>
    </div>
    <div class="container">
      <div class="role-tabs">
        <button class="role-tab" onclick="renderStudentApp()">学员打卡</button>
        <button class="role-tab active">营长入口</button>
      </div>
      <div class="admin-stats-bar">
        <div class="stat-pill">学员 <strong>${totalStudents}</strong> 人</div>
        <div class="stat-pill">今日打卡 <strong>${todayCheckedIn}</strong> / ${totalStudents}</div>
        <div class="stat-pill">平均进度 <strong>${avgProgress}%</strong></div>
      </div>
      <div class="export-panel">
        <h4>导出全部打卡明细</h4>
        <div class="export-row">
          <button class="export-btn primary" id="copyExportBtn">复制文本</button>
          <button class="export-btn" id="downloadCSVBtn">下载 CSV</button>
        </div>
        <textarea id="exportTextArea" style="display:none">${exportRows}</textarea>
      </div>
      <div class="section-label">学员列表 · 今日打卡情况</div>
      <div id="studentList">${studentCards}</div>
    </div>`;

  window._exportNames = names;
  window._exportStudents = students;

  app.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.getAttribute('data-action');
    const name = btn.getAttribute('data-name');
    if (action === 'viewDetail') { viewDetail(name); return; }
    if (action === 'clearStudent') { clearStudent(name); return; }
  }, true);

  document.getElementById('copyExportBtn').addEventListener('click', copyExport);
  document.getElementById('downloadCSVBtn').addEventListener('click', downloadCSV);
}

function viewDetail(name) {
  const students = window._exportStudents || getData().students;
  const stu = students[name];
  if (!stu) return;
  const today = todayStr();
  const dayNum = getDayNumber(stu.firstCheckIn, today);
  const consecutive = getConsecutiveDays(stu.checkInDays);
  const medals = getMedalCount(stu);
  const totalStars = calcTotalStars(stu);
  const days = [...(stu.checkInDays||[])].sort().reverse().slice(0,14);

  const dayRows = days.map(dateStr => {
    const { done, total } = calcTodayStars(stu, dateStr);
    const isToday = dateStr === today;
    return `<tr>
      <td style="padding:6px 12px;font-size:13px;">${formatDate(dateStr)}${isToday?' (今日)':''}</td>
      <td style="padding:6px 12px;font-size:13px;">${done}/${total}</td>
      <td style="padding:6px 12px;font-size:13px;color:${done===total?'#7BAE7F':'#8B7355'}">${done===total?'✓ 全部完成':done+'/'+total}</td>
    </tr>`;
  }).join('');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <div style="font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;">${name}</div>
        <button id="closeModalBtn" style="background:none;border:none;font-size:24px;cursor:pointer;color:#8B7355;line-height:1;">×</button>
      </div>

        <div class="modal-stat"><div class="modal-stat-num">${consecutive}</div><div class="modal-stat-label">连续天数</div></div>
        <div class="modal-stat"><div class="modal-stat-num">${totalStars}</div><div class="modal-stat-label">累计星星</div></div>
        <div class="modal-stat"><div class="modal-stat-num">${medals}</div><div class="modal-stat-label">7日勋章</div></div>
      </div>
      <div style="font-size:12px;color:#8B7355;margin-bottom:10px;">最近打卡记录</div>
      <div style="border:1px solid #EDE4D8;border-radius:10px;overflow:hidden;">
        <table style="width:100%;border-collapse:collapse;">
          <tr style="background:#FDF9F3;">
            <th style="padding:6px 12px;text-align:left;font-size:12px;color:#8B7355;">日期</th>
            <th style="padding:6px 12px;text-align:left;font-size:12px;color:#8B7355;">完成度</th>
            <th style="padding:6px 12px;text-align:left;font-size:12px;color:#8B7355;">状态</th>

    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target===overlay || e.target.id==='closeModalBtn') overlay.remove(); });
}

function clearStudent(name) {
  if (!confirm(`确定要清空学员「${name}」的所有数据吗？此操作不可恢复。`)) return;
  const data = getData();
  delete data.students[name];
  saveData(data);
  showToast(`已清空「${name}」的数据`);
  renderAdmin();
}

function copyExport() {
  const text = document.getElementById('exportTextArea')?.value || '';
  navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板')).catch(() => showToast('复制失败'));
}

function downloadCSV() {
  const names = window._exportNames || [];
  const students = window._exportStudents || {};
  const today = todayStr();

  // 标题行
  const headers = ['姓名','第X天','日期','早起温水','生活锚点（文本）','晚间复盘（文本）','早餐','中餐','晚餐','是否提交'];
  const rows = [];

  names.forEach(name => {
    const stu = students[name];
    if (!stu || !stu.checkInDays || stu.checkInDays.length === 0) return;

    // 按日期正序排列所有打卡日
    const sortedDays = [...stu.checkInDays].sort();

    sortedDays.forEach(dateStr => {
      const dayNum = getDayNumber(stu.firstCheckIn, dateStr);
      const dayTasks = stu.tasks?.[dateStr] || {};
      const isSubmitted = stu.submittedDates?.includes(dateStr) ? '✓ 已提交' : '✗ 未提交';

      const row = [
        name,
        dayNum,
        dateStr,
        dayTasks['morning_water'] ? '✓' : '✗',
        (dayTasks['life_anchor'] || '').replace(/"/g, '""'),   // 转义引号
        (dayTasks['evening_review'] || '').replace(/"/g, '""'),
        dayTasks['breakfast'] ? '✓' : '✗',
        dayTasks['lunch'] ? '✓' : '✗',
        dayTasks['dinner'] ? '✓' : '✗',
        isSubmitted,
      ];
      rows.push(row);
    });
  });

  // 用 Excel-safe CSV 格式
  const csvContent = [headers,...rows].map(r =>
    r.map(cell => {
      const str = String(cell);
      // 如果包含逗号、换行或引号，用引号包裹并转义内部引号
      if (str.includes(',') || str.includes('\n') || str.includes('"')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }).join(',')
  ).join('\n');

  const blob = new Blob(['\uFEFF' + csvContent], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `归序7日营_打卡明细_${today}.csv`; a.click();
  URL.revokeObjectURL(a.href);
  showToast('CSV（详细版）已下载');
}

function init() {
  const savedName = localStorage.getItem('guixu_current_student');
  if (savedName) {
    const student = getStudent(savedName);
    if (student) {
      currentStudent = savedName;
      currentViewDate = todayStr();
      renderStudentApp();
      return;
    }
  }
  renderLogin();
}
document.addEventListener('DOMContentLoaded', init);
